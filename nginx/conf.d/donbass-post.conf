# Rate limiting zones — defined here in the http context
limit_req_zone $binary_remote_addr zone=notify_api:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=strict_api:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=normal_api:10m  rate=30r/s;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name donbass-post.duckdns.org;

    ssl_certificate         /etc/letsencrypt/live/donbass-post.duckdns.org/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/donbass-post.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/donbass-post.duckdns.org/chain.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/donbass-post-access.log;
    error_log  /var/log/nginx/donbass-post-error.log warn;

    # == React App (static files) =============================================
    location / {
        root /var/www/donbass-post-web;

        # Fall back to index.html for client-side routing (TanStack Router).
        # Without this, refreshing on any route other than / returns 404.
        try_files $uri $uri/ /index.html;
    }

    # == Telegram Webhook =====================================================
    location /webhook {
        proxy_pass http://telegram-bot:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 50M;
    }

    # == Notification API =====================================================
    location /api/notify/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Origin, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0' always;
            add_header 'Content-Type' 'text/plain' always;
            return 204;
        }

        limit_req zone=notify_api burst=15 nodelay;
        proxy_pass http://telegram-bot:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        client_max_body_size 4M;
        client_body_buffer_size 128k;
    }

    # == General API ==========================================================
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Accept, Origin, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0' always;
            add_header 'Content-Type' 'text/plain' always;
            return 204;
        }

        limit_req zone=strict_api burst=20 nodelay;
        proxy_pass http://telegram-bot:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        client_max_body_size 10M;
    }

    # == Health & Stats =======================================================
    location /health {
        proxy_pass http://telegram-bot:3000;
        access_log off;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /stats {
        proxy_pass http://telegram-bot:3000;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
    }
}
