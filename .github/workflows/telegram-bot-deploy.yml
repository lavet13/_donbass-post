name: Deploy Telegram Bot

on:
  push:
    branches: ["main"]
    paths:
      - "apps/telegram-bot/**"
      - "packages/eslint-config/**"
      - "packages/typescript-config/**"
      - "packages/prettier-config/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/telegram-bot-deploy.yml"
  workflow_dispatch:
    inputs:
      staging:
        description: "Use Let's Encrypt staging (1=staging, 0=production)"
        required: false
        default: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env files
        run: |
          # Base .env
          cat > apps/telegram-bot/.env << EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          PORT=3000
          NODE_ENV=production
          USE_WEBHOOK=${{ secrets.USE_WEBHOOK }}
          MANAGER_CHAT_IDS=${{ secrets.MANAGER_CHAT_IDS }}
          ROOT_ADMIN_CHAT_ID=${{ secrets.ROOT_ADMIN_CHAT_ID }}
          WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}

          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}

          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF

          # Production overrides
          cat > apps/telegram-bot/.env.production << EOF
          DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}?schema=public
          EOF

      - name: Clean old source code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            # Remove old source but preserve named Docker volumes
            # (volumes live in Docker's storage, not in ~/telegram-bot)
            rm -rf ~/telegram-bot
            mkdir -p ~/telegram-bot

      - name: Copy source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          # Copy everything needed - docker compose files, nginx config, source
          source: "apps/telegram-bot/,packages/eslint-config/,packages/typescript-config/,packages/prettier-config/,package.json,yarn.lock,.yarnrc.yml,.yarn/releases/,docker-compose.yml,docker-compose.prod.yml,nginx/"
          target: "~/telegram-bot"
          strip_components: 0

      - name: Build and deploy
        env:
          # Defined at step level — appleboy/ssh-action picks these up
          # and forwards them into the remote shell session via envs:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          # On manual trigger: uses the input value (0 or 1)
          # On push trigger: workflow_dispatch inputs are unavailable,
          # so github.event.inputs.staging is empty — defaults to "0" which is the production certificates
          STAGING: ${{ github.event.inputs.staging || '0' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          # Comma-separated list of which env vars to forward into the SSH session
          envs: CERTBOT_EMAIL,STAGING
          script: |
            cd ~/telegram-bot

            # One command — Compose handles ordering via depends_on
            # --build rebuilds telegram-bot image
            # Compose starts postgres first (healthcheck), then bot, then nginx
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --build

            # Run migrations against the live database
            # exec runs a command inside the already-running container
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T telegram-bot yarn db:deploy

            # Seed is idempotent — safe to run every deploy
            # Call compiled seed directly — no tsx, no yarn dlx, no network calls
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T telegram-bot node dist/prisma/seed.js

            # Show final state of all services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            # Clean up dangling Docker layers from previous builds to prevent disk bloat
            docker image prune -f

            # Clean build cache older than 48h — keeps recent cache for faster builds
            # but prevents unbounded disk growth
            docker builder prune -f --reserved-space 4GB

      - name: Verify deployment
        env:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          STAGING: ${{ github.event.inputs.staging || '0' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: CERTBOT_EMAIL,STAGING
          script: |
            cd ~/telegram-bot

            if docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              ps --status running telegram-bot | grep -q "telegram-bot"; then
              echo "✅ Bot deployed successfully!"
            else
              echo "❌ Deployment failed!"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                logs telegram-bot --tail 50
              exit 1
            fi
