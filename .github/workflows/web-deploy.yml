name: Deploy Web App

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/ui/**"
      - "packages/forms/**"
      - ".github/workflows/web-deploy.yml"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      staging:
        description: "Use Let's Encrypt staging (1=staging, 0=production)"
        required: false
        default: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "yarn"

      - name: Cache node_modules & install state
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-nm-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-nm-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn workspace @donbass-post/web build
        env:
          # Served at root on your VPS domain
          VITE_BASE_PATH: /
          VITE_YMAPS_API_KEY: ${{ secrets.VITE_YMAPS_API_KEY }}

      - name: Prepare target directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            mkdir -p /var/www/donbass-post-web
            chmod 755 /var/www/donbass-post-web

      # scp-action copies files from the GitHub runner to your VPS
      # It's the same action you already use in telegram-bot-deploy.yml
      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "apps/web/dist/*"
          target: "/var/www/donbass-post-web"
          # Strips the leading apps/web/dist path so files land
          # directly in /var/www/donbass-post-web/ not
          # /var/www/donbass-post-web/apps/web/dist/
          strip_components: 3

      # Tell nginx to reload so it picks up any config changes.
      # Static file changes don't need this, but it's harmless and
      # covers the case where you changed nginx config too.
      - name: Reload nginx
        env:
          # Defined at step level — appleboy/ssh-action picks these up
          # and forwards them into the remote shell session via envs:
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          # On manual trigger: uses the input value (0 or 1)
          # On push trigger: workflow_dispatch inputs are unavailable,
          # so github.event.inputs.staging is empty — defaults to "0" which is the production certificates
          STAGING: ${{ github.event.inputs.staging || '0' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: CERTBOT_EMAIL,STAGING
          script: |
            cd ~/telegram-bot

            # Ensure ALL services are running (idempotent — skips already-running ones).
            # On first deploy this starts nginx-certbot and postgres.
            # On subsequent deploys this is effectively a no-op for those services.
            # CERTBOT_EMAIL is read here by nginx-certbot on first start.
            # STAGING=1 uses Let's Encrypt staging (safe for testing).
            # STAGING=0 uses production (real trusted certificates).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-build

            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              exec -T nginx-certbot nginx -s reload
