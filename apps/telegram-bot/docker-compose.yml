services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.5" # Max 50% of one CPU
          memory: 512M # Max 512MB RAM
    image: postgres:16-alpine
    container_name: donbass-post-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - donbass-post-data:/var/lib/postgresql/data
    networks:
      - donbass-post-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donbass_post"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  donbass-post-data:
    driver: local

networks:
  donbass-post-network:
    driver: bridge
